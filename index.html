<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Edge | Chronicles of Jacquin</title>
    <style>
        :root {
            --bg: #070708;
            --panel: #0f0f11;
            --accent: #e67e22;
            --forest: #27ae60;
            --village: #795548;
            --water: #2980b9;
            --text: #c0c0c0;
            --highlight: #ffffff;
            --border: #252529;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #game-wrapper {
            display: flex; width: 98vw; height: 96vh;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 400px; background: #050506;
            border-right: 1px solid var(--border);
            padding: 40px; display: flex; flex-direction: column;
        }

        #display-name { font-size: 2.5rem; margin: 0; color: var(--highlight); letter-spacing: 3px; }
        #location-name { color: var(--accent); font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 30px; }

        /* Perfected Map Connection System */
        .map-wrapper {
            position: relative; width: 320px; height: 320px;
            background: #000; border-radius: 4px; padding: 0;
            display: grid; grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
        }

        .map-cell-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .map-cell {
            width: 28px; height: 28px; background: #1a1a1c;
            border: 1px solid #2a2a2e; z-index: 5; transition: 0.5s;
        }

        .path { position: absolute; background: rgba(255,255,255,0.4); z-index: 1; box-shadow: 0 0 4px rgba(255,255,255,0.1); }
        .path-v { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        .path-h { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

        .map-cell.active { background: var(--highlight) !important; box-shadow: 0 0 25px var(--highlight); z-index: 10; transform: scale(1.2); border: none; }
        .map-cell.forest { background: var(--forest); }
        .map-cell.village { background: var(--village); }
        .map-cell.water { background: var(--water); }
        .map-cell.hidden { opacity: 0; }

        /* --- UI ELEMENTS --- */
        .quest-box { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .quest-item { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .quest-item.active { color: var(--accent); font-weight: bold; }

        .controls { margin-top: auto; display: flex; gap: 20px; align-items: center; }
        .dpad { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; }
        .btn { 
            background: #1a1a1c; border: 1px solid var(--border); color: #fff; padding: 15px 0; 
            cursor: pointer; font-weight: bold; font-size: 0.7rem; transition: 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .z-axis { display: flex; flex-direction: column; gap: 8px; }

        /* --- MAIN LOG --- */
        #game-log-area { flex-grow: 1; display: flex; flex-direction: column; background: #030303; }
        #output { flex-grow: 1; overflow-y: auto; padding: 60px 80px; font-size: 1.25rem; line-height: 2; }
        #input-container { 
            margin: 0 60px 60px 60px; background: #0c0c0d; border: 1px solid var(--border);
            border-radius: 4px; padding: 25px; display: flex; align-items: center;
        }
        #user-in { background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 1.1rem; }

        .room-title { color: var(--highlight); font-size: 2rem; font-weight: bold; margin-bottom: 15px; display: block; border-left: 5px solid var(--accent); padding-left: 20px; }
        .action-msg { color: var(--accent); font-style: italic; }
        .help-box { background: #0a0a0b; border: 1px solid #333; padding: 25px; margin: 20px 0; border-radius: 4px; }
        
        .fadeIn { animation: fader 0.8s forwards; }
        @keyframes fader { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Map popup */
        #map-popup { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); z-index: 9999; }
        .map-popup-inner { background: #0b0b0c; border: 1px solid var(--border); padding: 20px; border-radius: 8px; width: 420px; text-align: center; }
        .map-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .map-cell-popup { width: 60px; height: 60px; background: #111; border: 1px solid #222; display: flex; justify-content: center; align-items: center; color: var(--text); font-weight: bold; }
        .map-cell-popup .treasure { color: var(--accent); font-size: 1.2rem; }
        .map-cell-popup .you { color: var(--highlight); font-size: 1.2rem; margin-right: 6px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <aside id="sidebar">
        <h1 id="display-name">???</h1>
        <p id="location-name">THE VOID</p>

        <div id="map" class="map-wrapper"></div>

        <div class="quest-box">
            <p style="font-size:0.7rem; letter-spacing:2px; color:#444; margin-bottom:15px;">CURRENT QUESTS</p>
            <div id="quest-list"></div>
        </div>

        <div class="controls">
            <div class="dpad">
                <div></div><button class="btn" onclick="handleInput('north')">N</button><div></div>
                <button class="btn" onclick="handleInput('west')">W</button>
                <button class="btn" onclick="handleInput('south')">S</button>
                <button class="btn" onclick="handleInput('east')">E</button>
            </div>
            <div class="z-axis">
                <button class="btn" style="padding: 10px 15px" onclick="handleInput('up')">UP</button>
                <button class="btn" style="padding: 10px 15px" onclick="handleInput('down')">DWN</button>
            </div>
        </div>

        <div style="margin-top:30px;">
            <p style="font-size:0.7rem; color:#444; letter-spacing:2px; margin-bottom:10px;">INVENTORY</p>
            <ul id="inv-list" style="list-style:none; padding:0; color:var(--accent); font-weight:bold; font-size:0.9rem;"></ul>
        </div>
    </aside>

    <main id="game-log-area">
        <div id="output"></div>
        <div id="input-container">
            <span style="color:var(--accent); margin-right:20px; font-weight:bold;">❯</span>
            <input type="text" id="user-in" placeholder="State your name..." autofocus autocomplete="off">
        </div>
    </main>
</div>

<script>
    // --- MASSIVE GAME STATE ---
    let state = {
        name: "",
        x: 2, y: 4, z: 0,
        inv: [],
        phase: "NAMING",
        quests: [
            { id: "find_map", text: "Search the Clearing for a Map", status: "active" },
            { id: "elder", text: "Talk to the Village Elder", status: "active" },
            { id: "tavern", text: "Locate the Tavern in Bluefinch Village", status: "hidden" },
            { id: "treasure", text: "Find and open the Treasure Chest", status: "hidden" },
            { id: "bartender", text: "Help the Bartender", status: "hidden" }
        ],
        worldEvents: { barrelOpen: false, elderSpoken: false, wellUnlocked: false, treasureFound: false },
        treasure: '3,2,0',
        loot: ["Gold Coins", "Ancient Artifact", "Jeweled Ring", "Old Scroll", "Glowing Crystal"],
        shopsAreGnomes: false,
        shops: {
            '0,2,-1': { // Armory
                "Iron Breastplate": { price: 1, desc: "Sturdy armor forged by gnomish smiths" },
                "Reinforced Shield": { price: 1, desc: "A heavy shield with brass fittings" }
            },
            '1,1,-1': { // Magic
                "Mystic Rune": { price: 2, desc: "Grants luck and protection" },
                "Glowing Crystal": { price: 2, desc: "A focus for simple spells" }
            },
            '1,2,-1': { // General / Curios (entrance)
                "Healing Potion": { price: 1, desc: "Restores vitality and mends wounds" },
                "Old Scroll": { price: 1, desc: "A crumbling page with odd symbols" }
            },
            '2,2,-1': { // Potions
                "Greater Healing Potion": { price: 2, desc: "Stronger restorative draught" },
                "Antitoxin": { price: 1, desc: "Cures minor poisons" }
            }
        }
    };

    // --- EXPANDED STORY WORLD ---
    const world = {
        '2,4,0': {
            name: "Sun-Dappled Clearing", type: "forest", visited: true,
            exits: { north: '2,3,0', east: '3,4,0' },
            desc: "The forest floor is carpeted in soft emerald moss. Opposite a rickety trading post on the east side of the park, a patch of grass grows under the shadow of an old tree. The air is thick with the scent of pine and ancient magic.<br><br>A <b>weathered barrel</b> lies discarded among the roots, and a <b>Village Elder</b> sits silently on a cedar bench."
        },
        '2,3,0': {
            name: "The Whispering Trail", type: "forest", visited: false,
            exits: { south: '2,4,0', north: '2,2,0' },
            desc: "The trees lean inward here, their branches interlocking like skeletal fingers. You feel eyes upon you, though the woods seem empty. A narrow path leads deeper into the unknown. A small gnome sits on a root, humming to himself — he seems eager to talk."
        },
        '2,2,0': {
            name: "Bluefinch Village Entrance", type: "village", visited: false,
            exits: { south: '2,3,0', west: '1,2,0', east: '3,2,0' },
            desc: "Low stone walls mark the boundary of the village. Smoke curls lazily from chimneys in the distance. To the <b>West</b>, you hear the creak of an old well. To the <b>East</b>, the faint sound of music suggests a tavern."
        },
        '1,2,0': {
            name: "The Village Well", type: "village", visited: false,
            exits: { east: '2,2,0', down: '1,2,-1' },
            desc: "A massive circular well built from mossy cobblestones. A heavy iron grate covers the opening, but it looks rusted through. You might be able to go <b>down</b> if you had a way to pry it open."
        },
        '1,2,-1': {
            name: "Sunken Market Entrance", type: "water", visited: false,
            exits: { up: '1,2,0', west: '0,2,-1', east: '2,2,-1', north: '1,1,-1', down: '1,2,-2' },
            desc: "You have descended into the dark. The air is damp and cold. Water drips from the ceiling into a dark pool. Stairs open to a cramped market where small stalls of different trades cluster. The shopkeepers here are surprisingly small and busy."
        },
        '1,2,-2': {
            name: "Hidden Stairwell", type: "cavern", visited: false,
            exits: { up: '1,2,-1', east: '2,2,-2' },
            desc: "A narrow stairwell spirals deeper. The air grows colder and the lantern-light dims."
        },
        '2,2,-2': {
            name: "Gnome Warrens", type: "cavern", visited: false,
            exits: { west: '1,2,-2', south: '2,3,-2' },
            desc: "A low-ceilinged network of tunnels and niches carved into the stone. Little doors lead to private workshops. You sense this place hides secrets and patrons alike."
        },
        '2,3,-2': {
            name: "Secret Alcove", type: "cavern", visited: false,
            exits: { north: '2,2,-2' },
            desc: "A small alcove with an old mural on the wall. A strange symbol points to somewhere deeper, but the passage is blocked by rubble."
        },
        '0,2,-1': {
            name: "Gnomish Armory", type: "shop", visited: false,
            exits: { east: '1,2,-1' },
            desc: "A compact armory lined with tiny suits of armor and small weapons. A gnome with a soot-streaked apron hammers quietly at a bench."
        },
        '2,2,-1': {
            name: "Potioner's Booth", type: "shop", visited: false,
            exits: { west: '1,2,-1' },
            desc: "Row upon row of vials shimmer on shelves. A bespectacled gnome stirs a steaming cauldron."
        },
        '1,1,-1': {
            name: "Arcane Curios", type: "shop", visited: false,
            exits: { south: '1,2,-1' },
            desc: "Strange trinkets and sigils hang behind glass. A gnome in a patched robe polishes a rune-carved stone."
        },
        '3,2,0': {
            name: "Buried Treasure Site", type: "village", visited: false,
            exits: { west: '2,2,0', east: '4,2,0' },
            desc: "You stand in a quiet area. The ground beneath your feet feels curious, as if something lies hidden below. The map marks this spot with an X."
        },
        '4,2,0': {
            name: "The Drunken Finch Tavern", type: "village", visited: false,
            exits: { west: '3,2,0' },
            desc: "Warm amber light spills out into the street. The tavern is the lifeblood of Bluefinch. A sign hangs above the door depicting a bird with a tiny mug. You can try to <b>enter tavern</b> here."
        },
        '4,2,1': {
            name: "Inside The Drunken Finch Tavern", type: "interior", visited: false,
            exits: { down: '4,2,0' },
            desc: "You step into a low-ceilinged tavern filled with chatter and the smell of ale. A stout bartender polishes mugs behind the counter. He nods at you, waiting."
        },
        '3,4,0': {
            name: "The Azure Brook", type: "water", visited: false,
            exits: { west: '2,4,0' },
            desc: "The brook shimmers with an unnatural blue hue. The water is so clear you can see the white sand on the bottom. It feels like a place for reflection."
        }
    };

    // --- ENGINE FUNCTIONS ---
    const log = document.getElementById('output');
    const input = document.getElementById('user-in');

    function print(msg) {
        const div = document.createElement('div');
        div.className = 'fadeIn';
        div.style.marginBottom = "30px";
        div.innerHTML = msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function updateQuest(id, status) {
        const q = state.quests.find(x => x.id === id);
        if (q) q.status = status;
        renderQuests();
    }

    function renderQuests() {
        const qList = document.getElementById('quest-list');
        qList.innerHTML = "";
        state.quests.forEach(q => {
            if (q.status !== "hidden") {
                const div = document.createElement('div');
                div.className = `quest-item ${q.status === 'active' ? 'active' : ''}`;
                div.innerHTML = `${q.status === 'done' ? '✓' : '○'} ${q.text}`;
                qList.appendChild(div);
            }
        });
    }

    function renderMap() {
        const map = document.getElementById('map');
        map.innerHTML = '';
        for (let y = 0; y < 5; y++) {
            for (let x = 0; x < 5; x++) {
                const container = document.createElement('div');
                container.className = 'map-cell-container';
                const room = world[`${x},${y},${state.z}`];

                if (room && room.visited) {
                    const cell = document.createElement('div');
                    cell.className = `map-cell ${room.type}`;
                    if (x === state.x && y === state.y) cell.classList.add('active');
                    
                        // Draw Paths only if the exit target exists in the world
                        if (room.exits.north && world[room.exits.north]) drawPath(container, 'path-v', '0', '50%');
                        if (room.exits.south && world[room.exits.south]) drawPath(container, 'path-v', '50%', '50%');
                        if (room.exits.east && world[room.exits.east]) drawPath(container, 'path-h', '50%', '50%');
                        if (room.exits.west && world[room.exits.west]) drawPath(container, 'path-h', '50%', '0');
                    
                    container.appendChild(cell);
                } else {
                    const cell = document.createElement('div');
                    cell.className = 'map-cell hidden';
                    container.appendChild(cell);
                }
                map.appendChild(container);
            }
        }
        document.getElementById('location-name').innerText = world[`${state.x},${state.y},${state.z}`]?.name.toUpperCase() || "THE UNKNOWN";
        document.getElementById('inv-list').innerHTML = state.inv.map(i => `<li>• ${i}</li>`).join('');
    }

    function drawPath(parent, cls, t, l /*, ty, tx */) {
        const p = document.createElement('div');
        p.className = `path ${cls}`;
        p.style.top = t;
        p.style.left = l;
        parent.appendChild(p);
    }

    function openMapPopup() {
        if (!state.inv.includes("Ancient Map")) { print("You don't have a map to look at."); return; }
        updateQuest("treasure", "active");
        let popup = document.getElementById('map-popup');
        if (!popup) {
            popup = document.createElement('div');
            popup.id = 'map-popup';
            popup.innerHTML = `<div class="map-popup-inner"><button id="map-close" style="float:right;background:transparent;border:none;color:var(--accent);font-weight:bold;">✕</button><h3 style="margin:0;color:var(--highlight);">Ancient Map</h3><div class="map-grid"></div><p style="color:#aaa;margin-top:10px;font-size:0.9rem;">Legend: <span style="color:var(--accent)">X</span> = Treasure &nbsp; ● = You</p></div>`;
            document.body.appendChild(popup);
            document.getElementById('map-close').addEventListener('click', closeMapPopup);
            popup.addEventListener('click', (e) => { if (e.target === popup) closeMapPopup(); });
        }
        renderMapPopup();
        popup.style.display = 'flex';
    }

    function closeMapPopup() {
        const p = document.getElementById('map-popup'); if (p) p.style.display = 'none';
    }

    function renderMapPopup() {
        const grid = document.querySelector('#map-popup .map-grid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let y = 0; y < 5; y++) {
            for (let x = 0; x < 5; x++) {
                const cell = document.createElement('div');
                cell.className = 'map-cell-popup';
                const coord = `${x},${y},${state.z}`;
                if (coord === state.treasure && !state.worldEvents.treasureFound) {
                    cell.innerHTML = '<span class="treasure">X</span>';
                }
                if (x === state.x && y === state.y) {
                    cell.innerHTML = `<span class="you">●</span>` + cell.innerHTML;
                }
                grid.appendChild(cell);
            }
        }
    }

    function showShop() {
        const coord = `${state.x},${state.y},${state.z}`;
        const shop = state.shops[coord];
        if (!shop) { print("There is no shopkeeper here."); return; }
        const owner = state.shopsAreGnomes ? 'Gnome Vendor' : 'Merchant';
        let shopMsg = `<div class="help-box" style="text-align:left;"><b>${owner}'s WARES</b><br><br>`;
        Object.entries(shop).forEach(([item, data]) => {
            shopMsg += `<b>${item}</b> - Costs: ${data.price} treasure item(s)<br><span style="color:#666;font-size:0.9rem;">${data.desc}</span><br><br>`;
        });
        shopMsg += '<span style="color:#aaa;font-size:0.85rem;">You have <b>' + state.inv.filter(i => state.loot.includes(i)).length + '</b> treasure items. Use <b>buy [item name]</b> to purchase.</span></div>';
        print(shopMsg);
    }

    function buyItem(itemName) {
        const coord = `${state.x},${state.y},${state.z}`;
        const shop = state.shops[coord];
        if (!shop) { print("No merchant here to sell you anything."); return; }
        const itemKey = Object.keys(shop).find(k => k.toLowerCase() === itemName.toLowerCase());
        if (!itemKey) { print(`The merchant doesn't offer "${itemName}". Try <b>shop</b> to see what's available.`); return; }
        const treasureItems = state.inv.filter(i => state.loot.includes(i));
        const price = shop[itemKey].price;
        if (treasureItems.length < price) {
            print(`<b>${itemKey}</b> costs ${price} treasure item(s). You only have ${treasureItems.length}.`);
            return;
        }
        for (let i = 0; i < price; i++) {
            const idx = state.inv.indexOf(treasureItems[0]);
            if (idx > -1) state.inv.splice(idx, 1);
        }
        if (!state.inv.includes(itemKey)) state.inv.push(itemKey);
        print(`<span style="color:var(--accent);">✓ Trade complete!</span> You exchange ${price} treasure item(s) for <b>${itemKey}</b>.`);
    }

    function handleInput(val) {
        const raw = val.toLowerCase().trim();
        if (!raw) return;

        if (state.phase === "NAMING") {
            state.name = val;
            document.getElementById('display-name').innerText = state.name.toUpperCase();
            state.phase = "PLAYING";
            input.placeholder = "Enter command...";
            print(`<b>Spirit:</b> "The threads of fate weave around you, <b>${state.name}</b>. Awake."`);
            look();
            renderQuests();
            return;
        }

        print(`<span style="color:var(--accent)">❯ ${val}</span>`);
        const room = world[`${state.x},${state.y},${state.z}`];

        if (raw === "!help") {
            print(`<div class="help-box"><b>MASTER COMMAND LIST</b><br>• <b>Movement:</b> north, south, east, west, up, down<br>• <b>Interactions:</b> open barrel, talk to elder, take map, open chest, dig<br>• <b>Shopping:</b> shop, buy [item]<br>• <b>System:</b> look, map, !help</div>`);
        }
        else if (raw === 'shop' || raw === 'browse shop' || raw === 'talk to merchant') {
            showShop();
        }
        else if (raw.startsWith('buy ')) {
            const itemName = raw.substring(4).trim();
            buyItem(itemName);
        }
        else if (raw === 'map' || raw === 'look at map' || raw === 'look map') {
            openMapPopup();
        }
        else if (raw === 'open chest' || raw === 'dig') {
            if (!state.inv.includes("Ancient Map")) {
                print("You reach for a chest, but there is nothing here to open.");
            } else if (state.worldEvents.treasureFound) {
                print("The chest has already been opened and emptied.");
            } else {
                const loc = `${state.x},${state.y},${state.z}`;
                if (loc === state.treasure) {
                    state.worldEvents.treasureFound = true;
                    const lootMsg = state.loot.map(l => `<b>${l}</b>`).join(", ");
                    print(`You find a weathered chest hidden in this place. With great effort, you pry it open. Inside lies: ${lootMsg}!`);
                    state.loot.forEach(item => {
                        if (!state.inv.includes(item)) state.inv.push(item);
                    });
                    updateQuest("treasure", "done");
                } else {
                    print("You search around but find no chest here. Check your map more carefully.");
                }
            }
        }
        else if (['north','south','east','west','up','down'].includes(raw)) {
            if (room.exits[raw]) {
                const n = room.exits[raw].split(',');
                state.x = parseInt(n[0]); state.y = parseInt(n[1]); state.z = parseInt(n[2]);
                const nextRoom = world[`${state.x},${state.y},${state.z}`];
                nextRoom.visited = true;
                
                if (nextRoom.name === "The Drunken Finch Tavern" && state.worldEvents.elderSpoken) {
                    updateQuest("tavern", "done");
                }
                look();
            } else {
                print("<span class='action-msg'>You cannot pass that way. The world remains closed.</span>");
            }
        }
        else if (raw === "open barrel" && state.x === 2 && state.y === 4) {
            state.worldEvents.barrelOpen = true;
            print("You pry the rotted wood apart. It groans, then shatters, revealing an <b>Ancient Map</b> nestled in dried straw.");
        }
        else if (raw === "take map" && state.x === 2 && state.y === 4 && state.worldEvents.barrelOpen) {
            if (!state.inv.includes("Ancient Map")) {
                state.inv.push("Ancient Map");
                print("You take the <b>Ancient Map</b>. It is drawn on skin-like parchment and pulses with a faint, orange light.");
                updateQuest("find_map", "done");
            } else { print("You already have the map."); }
        }
        else if (raw === "talk to elder" && state.x === 2 && state.y === 4) {
            print(`<b>Village Elder:</b> "Welcome to Nature's Edge, ${state.name}. If it is the Tavern you seek, follow the trail North through the Whispering Woods. Once you hit the village square, head East. But beware... the well to the West has been acting strange lately."`);
            state.worldEvents.elderSpoken = true;
            updateQuest("elder", "done");
            updateQuest("tavern", "active");
        }
        else if (raw === 'enter tavern' && state.x === 4 && state.y === 2 && state.z === 0) {
            state.x = 4; state.y = 2; state.z = 1;
            world[`${state.x},${state.y},${state.z}`].visited = true;
            print(`<span class="room-title">${world[`${state.x},${state.y},${state.z}`].name}</span>${world[`${state.x},${state.y},${state.z}`].desc}`);
            updateQuest('bartender', 'active');
        }
        else if (raw === 'leave' && state.z === 1) {
            // leave interior rooms and return to surface if possible
            const current = world[`${state.x},${state.y},${state.z}`];
            if (current && current.exits && current.exits.down) {
                const n = current.exits.down.split(',');
                state.x = parseInt(n[0]); state.y = parseInt(n[1]); state.z = parseInt(n[2]);
                const nextRoom = world[`${state.x},${state.y},${state.z}`];
                nextRoom.visited = true;
                look();
            } else { print("You can't leave from here."); }
        }
        else if (raw === 'talk to bartender' && state.x === 4 && state.y === 2 && state.z === 1) {
            print(`<b>Bartender:</b> "Ah, a new face. I've lost a special cask of aged ale somewhere near the docks. Bring it back and I'll reward you handsomely."`);
            updateQuest('bartender', 'active');
        }
        else if (raw === "talk to gnome" && state.x === 2 && state.y === 3) {
            print(`<b>Gnome:</b> "Greetings, tiny traveler! If you're looking for rare goods, follow the stair into the well. All the shops below are run by my kin — gnomes with an eye for craft. Visit them and spend your finds wisely.");`);
            state.shopsAreGnomes = true;
        }
        else if (raw === "look") { look(); }
        else {
            print("<span class='action-msg'>That command is lost to the wind. Type !help if you are confused.</span>");
        }
        
        renderMap();
        renderQuests();
    }

    function look() {
        const r = world[`${state.x},${state.y},${state.z}`];
        print(`<span class="room-title">${r.name}</span>${r.desc}`);
    }

    input.addEventListener('keydown', (e) => { if(e.key === 'Enter') { handleInput(input.value); input.value = ''; } });
    print("<b>Spirit:</b> \"A soul drifts in the grey... traveler, by what name are you known?\"");
    renderMap();
</script>
</body>
</html>
